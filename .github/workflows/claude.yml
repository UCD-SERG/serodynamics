# Calls the reusable Claude Code workflow in d-morrison/gha. Secrets passed
# explicitly so the cross-repo call forwards a real token. The reusable enforces
# the @claude mention + trusted-author gate.
#
# Pinned to the @v2 moving major tag.
name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: write
    uses: d-morrison/gha/.github/workflows/claude.yml@v2
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    with:
      # serodynamics is an R package; rjags/runjags need the JAGS system library.
      # setup-r defaults true and r-extra-packages' default `local::.` installs
      # the package (and its rjags/runjags deps) on top of JAGS.
      apt-packages: jags
